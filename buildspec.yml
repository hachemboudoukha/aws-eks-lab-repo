version: 0.2

env:
  variables:
    DOCKER_BUILDKIT: "1"
  parameter-store:
    # Optional: Use AWS Systems Manager Parameter Store for sensitive values
    # AWS_ACCOUNT_ID: /codebuild/aws-account-id
    # EKS_CLUSTER_NAME: /codebuild/eks-cluster-name
    # EKS_CLUSTER_REGION: /codebuild/eks-cluster-region
    # IMAGE_REPO_NAME: /codebuild/image-repo-name

phases:
  pre_build:
    commands:
      - echo "=== Pre-build Phase ==="
      - echo "Setting AWS environment variables..."
      - |
        if [ -z "$AWS_ACCOUNT_ID" ] || [ -z "$IMAGE_REPO_NAME" ] || [ -z "$EKS_CLUSTER_NAME" ]; then
          echo "ERROR: Required environment variables not set (AWS_ACCOUNT_ID, IMAGE_REPO_NAME, EKS_CLUSTER_NAME)"
          exit 1
        fi
      - export REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - echo "Docker Registry URI: $REPOSITORY_URI"

      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

      - echo "Setting up Kubernetes context..."
      - aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_DEFAULT_REGION

      - echo "Installing kubectl..."
      - curl -LO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
      - kubectl version --client

      - echo "Verifying EKS cluster access..."
      - aws eks describe-cluster --name $EKS_CLUSTER_NAME --region $AWS_DEFAULT_REGION
      - kubectl get nodes

  build:
    commands:
      - echo "=== Build Phase ==="
      - echo "Building Docker image on $(date)"
      - docker build -t $REPOSITORY_URI:latest -t $REPOSITORY_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION .

  post_build:
    commands:
      - echo "=== Post-build Phase ==="
      - echo "Pushing Docker image to ECR..."
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION

      - echo "Updating Kubernetes manifests with image URI..."
      - |
        sed -i "s|{{ DOCKER_REGISTRY_URI }}/{{ IMAGE_REPO_NAME }}:latest|$REPOSITORY_URI:latest|g" deployment.yaml
        sed -i "s|{{ APP_DOMAIN }}|${APP_DOMAIN:-example.com}|g" ingress.yaml

      - echo "Applying Kubernetes manifests..."
      - kubectl apply -f deployment.yaml -f service.yaml -f ingress.yaml

      - echo "Waiting for deployment to be ready..."
      - kubectl rollout status deployment/my-app -n default --timeout=5m

      - echo "Build and deployment completed successfully!"

artifacts:
  files:
    - deployment.yaml
    - service.yaml
    - ingress.yaml
  discard-paths: yes

cache:
  paths:
    - '/root/.docker/**/*'
